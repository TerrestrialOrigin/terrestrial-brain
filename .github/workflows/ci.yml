name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Deno + Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Edge-function secrets are gitignored; the deterministic fake AI provider
      # needs no OpenRouter key. The access key here matches the value the test
      # client sends (tests/helpers/mcp-client.ts).
      - name: Write edge-function env
        run: |
          cat > supabase/functions/.env <<'EOF'
          MCP_ACCESS_KEY=dev-test-key-123
          TB_AI_PROVIDER=fake
          EOF

      - name: Start Supabase stack
        run: supabase start -x studio,realtime,imgproxy,inbucket,storage-api

      - name: Deno tests (deterministic, fake AI provider)
        run: deno task test

      - name: Deno lint
        run: deno lint

      - name: Deno format check
        run: deno fmt --check

      - name: Stop Supabase stack
        if: always()
        run: supabase stop --no-backup

  plugin:
    name: Obsidian plugin (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obsidian-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
